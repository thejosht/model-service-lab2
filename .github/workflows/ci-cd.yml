name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test (import + env load)
        run: |
          python -c "from dotenv import load_dotenv; import os; load_dotenv(); print('dotenv_ok')"

      - name: Build Docker image
        run: docker build -t model-service:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag model-service:latest ${{ secrets.DOCKERHUB_USERNAME }}/model-service-lab2:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/model-service-lab2:latest
